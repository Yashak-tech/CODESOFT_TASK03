<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="calculator" id="calculator">

    <!-- Display -->
    <div class="display">
      <div class="display-previous" id="previousOperand"></div>
      <div class="display-current" id="currentOperand">0</div>
    </div>

    <!-- Buttons -->
    <div class="keys">
      <button class="key key-fn" data-action="clear">AC</button>
      <button class="key key-fn" data-action="delete">DEL</button>
      <button class="key key-fn" data-action="percent">%</button>
      <button class="key key-op" data-action="operator" data-operator="÷">÷</button>

      <button class="key key-num" data-action="number">7</button>
      <button class="key key-num" data-action="number">8</button>
      <button class="key key-num" data-action="number">9</button>
      <button class="key key-op" data-action="operator" data-operator="×">×</button>

      <button class="key key-num" data-action="number">4</button>
      <button class="key key-num" data-action="number">5</button>
      <button class="key key-num" data-action="number">6</button>
      <button class="key key-op" data-action="operator" data-operator="−">−</button>

      <button class="key key-num" data-action="number">1</button>
      <button class="key key-num" data-action="number">2</button>
      <button class="key key-num" data-action="number">3</button>
      <button class="key key-op" data-action="operator" data-operator="+">+</button>

      <button class="key key-num key-zero" data-action="number">0</button>
      <button class="key key-num" data-action="decimal">.</button>
      <button class="key key-equals" data-action="equals">=</button>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
